<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronometro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a2e;
            color: #eee;
        }

        .container {
            text-align: center;
        }

        .display {
            font-size: 4rem;
            font-variant-numeric: tabular-nums;
            letter-spacing: 2px;
            margin-bottom: 2rem;
            font-weight: 300;
        }

        .buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        button {
            padding: 0.8rem 2rem;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active {
            transform: scale(0.95);
        }

        #startBtn {
            background: #4ecca3;
            color: #1a1a2e;
        }

        #resetBtn {
            background: #e94560;
            color: #fff;
        }

        .laps {
            margin-top: 2rem;
            max-height: 200px;
            overflow-y: auto;
        }

        .laps li {
            list-style: none;
            padding: 0.4rem 0;
            border-bottom: 1px solid #333;
            font-variant-numeric: tabular-nums;
        }

        #lapBtn {
            background: #3a86ff;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="display" id="display">00:00:00.00</div>
        <div class="buttons">
            <button id="startBtn">Iniciar</button>
            <button id="lapBtn">Vuelta</button>
            <button id="resetBtn">Reiniciar</button>
        </div>
        <ul class="laps" id="laps"></ul>
    </div>

    <script>
        let startTime = 0;
        let elapsed = 0;
        let interval = null;
        let running = false;
        let lapCount = 0;

        const display = document.getElementById('display');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const lapBtn = document.getElementById('lapBtn');
        const lapsEl = document.getElementById('laps');

        function formatTime(ms) {
            const hours = Math.floor(ms / 3600000);
            const minutes = Math.floor((ms % 3600000) / 60000);
            const seconds = Math.floor((ms % 60000) / 1000);
            const centiseconds = Math.floor((ms % 1000) / 10);
            return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}.${String(centiseconds).padStart(2, '0')}`;
        }

        function update() {
            elapsed = Date.now() - startTime;
            display.textContent = formatTime(elapsed);
        }

        startBtn.addEventListener('click', () => {
            if (!running) {
                startTime = Date.now() - elapsed;
                interval = setInterval(update, 10);
                running = true;
                startBtn.textContent = 'Pausar';
                startBtn.style.background = '#f0a500';
            } else {
                clearInterval(interval);
                running = false;
                startBtn.textContent = 'Reanudar';
                startBtn.style.background = '#4ecca3';
            }
        });

        resetBtn.addEventListener('click', () => {
            clearInterval(interval);
            running = false;
            elapsed = 0;
            lapCount = 0;
            display.textContent = '00:00:00.00';
            startBtn.textContent = 'Iniciar';
            startBtn.style.background = '#4ecca3';
            while (lapsEl.firstChild) {
                lapsEl.removeChild(lapsEl.firstChild);
            }
        });

        lapBtn.addEventListener('click', () => {
            if (running) {
                lapCount++;
                const li = document.createElement('li');
                li.textContent = `Vuelta ${lapCount}: ${formatTime(elapsed)}`;
                lapsEl.prepend(li);
            }
        });
    </script>
</body>
</html>
